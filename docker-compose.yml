version: '3.9'

services:
  db:
    build:
      context: ./db
    container_name: postgres_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: my_pq_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin

volumes:
  pgdata:
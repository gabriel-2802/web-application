spring.application.name=demo

# DataSource Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/my_pq_db
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=admin
spring.datasource.password=admin

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# JWT Configuration
app.jwt.secret=mysecretkeymysecretkeymysecretkeymysecretkeymysecretkeymysecretmysecretkey
app.jwt.expiration=2592000000

# Admin Configuration
app.admin.register.code=282828282
